name: bidready-ksa

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bidready
      POSTGRES_USER: bidready
      POSTGRES_PASSWORD: bidready_dev_pw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidready"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bidready_minio
      MINIO_ROOT_PASSWORD: bidready_minio_dev_pw
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  n8n:
    image: n8nio/n8n:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: bidready
      DB_POSTGRESDB_USER: bidready
      DB_POSTGRESDB_PASSWORD: bidready_dev_pw
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_ENCRYPTION_KEY: bidready_n8n_dev_key_change_me
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Asia/Riyadh
    ports:
      - "5678:5678"
    volumes:
      - n8ndata:/home/node/.n8n

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    profiles:
      - optional-local-llm

volumes:
  pgdata:
  miniodata:
  n8ndata:
  promdata:
  grafanadata:
  ollamadata:
